<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi hermanita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        star: '#FFFACD',
                        glow: '#FFD700',
                    },
                    fontFamily: {
                        cute: ['"Pacifico"', 'cursive'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .star {
                clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to bottom, #000022, #000044, #001133);
            min-height: 100vh;
            overflow: hidden;
        }

        .star {
            background: radial-gradient(circle, #FFFACD 0%, #FFD700 100%);
            box-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700, 0 0 30px #FFD700;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            from { opacity: 0.7; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1.1); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center relative">

    <!-- Audio para la canción -->
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        Tu navegador no soporta audio.
    

    <!-- Contenedor de estrellas -->
    <div id="stars-container" class="fixed top-0 left-0 w-full h-full -z-10"></div>

    <!-- Texto -->
    <h1 id="message" class="text-4xl md:text-6xl lg:text-7xl font-cute text-star opacity-0 transition-all duration-1000 ease-out drop-shadow-[0_0_15px_#FFD700]">
        Te quiero hermanita
    </h1>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('message');
            const starsContainer = document.getElementById('stars-container');
            const numStars = 150; // Cantidad de estrellas

            // Crear estrellas
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                const size = Math.random() * 10 + 5; // Tamaño aleatorio
                const x = Math.random() * 100; // Posición X
                const y = Math.random() * 100; // Posición Y
                const delay = Math.random() * 5; // Retraso en la animación

                star.classList.add('star', 'absolute', 'opacity-0');
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${x}%`;
                star.style.top = `${y}%`;
                star.style.animationDelay = `${delay}s`;
                star.style.transition = `opacity 0.5s ease ${i * 0.02}s`;

                starsContainer.appendChild(star);
            }

            // Iniciar animación
            setTimeout(() => {
                // Encender estrellas
                const stars = document.querySelectorAll('.star');
                stars.forEach(star => {
                    star.classList.add('opacity-100');
                });

                // Mostrar mensaje
                setTimeout(() => {
                    document.getElementById('message').classList.add('opacity-100');
                }, 1500);

                // Reproducir música
                const music = document.getElementById('bgMusic');
                music.play().catch(e => console.log("Haz clic en la página para escuchar la música"));

            }, 300);
        });
    </script>
</body>
</html>
