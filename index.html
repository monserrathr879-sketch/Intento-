<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi hermana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FDB813',
                        secondary: '#8B4513',
                        dark: '#121212',
                    },
                    fontFamily: {
                        cute: ['"Pacifico"', 'cursive'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .petal {
                transform-origin: bottom center;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            overflow: hidden;
        }

        .petal {
            background: linear-gradient(135deg, #FFE066 0%, #FDB813 100%);
            border-radius: 100% 0;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.2), 
                        inset -2px -2px 5px rgba(0,0,0,0.1);
        }

        .center {
            background: radial-gradient(circle, #8B4513 0%, #5D2906 100%);
        }

        .stem {
            background: linear-gradient(to right, #2E8B57, #3CB371);
        }

        .leaf {
            background: linear-gradient(135deg, #3CB371, #2E8B57);
            border-radius: 100% 0;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <!-- Contenedor de la flor -->
    <div id="flower-container" class="relative w-64 h-64 md:w-80 md:h-80">
        <!-- Centro de la flor -->
        <div class="center absolute top-1/2 left-1/2 w-16 h-16 md:w-20 md:h-20 rounded-full -translate-x-1/2 -translate-y-1/2 opacity-0 scale-0 transition-all duration-500 ease-out"></div>
        
        <!-- Los pétalos se generarán aquí con JS -->
    </div>

    <!-- Tallo y hojas -->
    <div class="relative">
        <div class="stem w-3 h-32 md:w-4 md:h-40 opacity-0 transition-opacity duration-500 delay-1000"></div>
        <div class="leaf absolute top-10 -left-8 w-8 h-16 md:w-10 md:h-20 opacity-0 rotate-[-30deg] transition-opacity duration-500 delay-1200"></div>
        <div class="leaf absolute top-16 -right-8 w-8 h-16 md:w-10 md:h-20 opacity-0 rotate-[30deg] scale-x-[-1] transition-opacity duration-500 delay-1400"></div>
    </div>

    <!-- Frase -->
    <h1 id="message" class="mt-8 text-3xl md:text-5xl font-cute text-primary opacity-0 transition-opacity duration-700 delay-1500">
        Te quiero hermana
    </h1>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('flower-container');
            const numPetals = 16; // Número de pétalos
            const angleStep = 360 / numPetals;

            // Crear pétalos
            for (let i = 0; i < numPetals; i++) {
                const petal = document.createElement('div');
                petal.classList.add('petal', 'absolute', 'w-12', 'h-24', 'md:w-16', 'md:h-32', 'top-1/2', 'left-1/2', '-translate-x-1/2', '-translate-y-full', 'opacity-0', 'scale-0');
                petal.style.transform = `rotate(${i * angleStep}deg) translateY(-10px)`;
                petal.style.transition = `all 0.5s ease ${i * 0.05}s`;
                container.appendChild(petal);
            }

            // Iniciar animación
            setTimeout(() => {
                // Aparecer centro
                const center = document.querySelector('.center');
                center.classList.remove('opacity-0', 'scale-0');
                center.classList.add('opacity-100', 'scale-100');

                // Aparecer pétalos
                const petals = document.querySelectorAll('.petal');
                petals.forEach(petal => {
                    petal.classList.remove('opacity-0', 'scale-0');
                    petal.classList.add('opacity-100', 'scale-100');
                });

                // Aparecer tallo, hojas y frase
                document.querySelector('.stem').classList.add('opacity-100');
                document.querySelectorAll('.leaf').forEach(leaf => leaf.classList.add('opacity-100'));
                document.getElementById('message').classList.add('opacity-100');
            }, 300);
        });
    </script>
</body>
</html>
